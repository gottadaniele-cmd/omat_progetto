<div class="sidebar glass-opaco">
    <h2 class="title">OMAT</h2>

    <div id="buttons">

        @if (user(); as currentUser) {
            <div class="user-card">
                <strong>{{ currentUser.name }}</strong>
                <span>{{ roleLabel() }}</span>
            </div>
        } @else {
            <button id="btnLogin" class="login-button" routerLink="/login" routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: true }">
                <p class="text" >Login</p>
            </button>
        }

        <hr class="hrSide">

        <a id="contact-button" class="button" routerLink="/home" routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }">
            <i data-lucide="home" class="icon"></i>
            <p class="text">Home</p>
        </a>

        @if (canSeeOrders()) {
            <a id="order-button" class="button" routerLink="/richieste-ordini" routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: true }">
                <i data-lucide="clipboard-list" class="icon"></i>
                <p class="text">Richiedi il tuo ordine</p>
            </a>
        }

        @if (canSeePcto()) {
            <a id="stage-button" class="button" routerLink="/pcto" routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: true }">
                <i data-lucide="graduation-cap" class="icon"></i>
                <p class="text">Prenota il PCTO</p>
            </a>
        }

        @if (canSeeAdmin()) {
            <a id="admin-button" class="button" routerLink="/admin" routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: true }">
                <i data-lucide="layout-dashboard" class="icon"></i>
                <p class="text">Dashboard admin</p>
            </a>
        }

    </div>

    @if (user()) {
        <button id="btnLogout" class="logout-button" type="button" (click)="logout()">
            <p class="text">Logout</p>
        </button>
    }
</div>
