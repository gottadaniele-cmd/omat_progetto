<!doctype html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <title>OMAT</title>

  <link rel="stylesheet" href="../css/ordini.css" />
  <link rel="stylesheet" href="../css/base.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jura:wght@300..700&display=swap" rel="stylesheet">

  <script src="../vendor/jquery-3.5.1.min.js"></script>
  <script type="text/javascript" src="../js/index.js" defer></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="background-blobs"></div>

  <div class="container">
    <!-- Sidebar fissa -->
    <div class="sidebar glass">
      <h2 class="title">OMAT</h2>
      <div id="buttons">
        <button id="btnLogin" class="login-button">
          <p class="text">Login</p>
        </button>
        <hr class="hrSide">
        <button id="order-button" class="button">
          <i data-lucide="clipboard-list" class="icon"></i>
          <p class="text">Prenota il tuo ordine</p>
          <!-- <span class="badge">5</span> -->
        </button>
        <button id="stage-button" class="button">
          <i data-lucide="graduation-cap" class="icon"></i>
          <p class="text">Richiedi di fare il PCTO da noi</p>
          <!-- <span class="badge">2</span> -->
        </button>
        <button id="contact-button" class="button">
          <i data-lucide="info" class="icon"></i>
          <p class="text">Chi siamo e contatti</p>
        </button>
      </div>
      <button id="btnLogout" class="logout-button">
        <p class="text">Logout</p>
      </button>
    </div>

    <!-- Contenuto principale -->
    <div class="main-content">
      <section class="hero">
        <div class="hero-text">
          <h3 class="h3Hero">OMAT<span class="sncHero">s.n.c</span></h3>
          <hr class="hrHero">
          <h2 class="h2Hero">Richiedi il tuo</h2>
          <h1 class="h1Hero">Ordine</h1>
          <p>Compila il form per richiedere la lavorazione del tuo pezzo.
            Il nostro team valuterà l'ordine e ti ricontatterà.</p>
        </div>
      </section>

      <section class="form2 glass">
        <div class="form2-text">
          <div id="nomeDiv" class="divsForm">
            <label class="labelsForm">Nome:</label>
            <input class="inputText" type="text" id="Nome" placeholder="Inserisci qui il nome del prodotto..">
          </div>
          <div id="descrizioneDiv" class="divsForm">
            <label class="labelsForm">Descrizione:</label>
            <textarea class="inputDescrizione" type="text" id="Descrizione" placeholder="Inserisci qui la descrizione del prodotto.."></textarea>
          </div>
          <div id="imageDiv" class="divsForm">
            <label class="labelsForm">Disegno dell'ordine:</label>
            <div class="divImageForm">
              <input type="file" hidden accept="image/*">
              <div class="insideImageForm">
                <img src="../assets/images/Gallery.png" alt="upload icon" class="iconForm">
                <p class="pImageForm">
                  Trascina qui l’immagine oppure
                  <span id="clickUpload" style="cursor: pointer; text-decoration: underline;">clicca qui</span>
                  per sfogliare le cartelle.
                </p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
</body>

<script>lucide.createIcons();</script>


</html>
